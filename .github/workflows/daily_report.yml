name: TW市場監控報告

on:
  schedule:
    - cron: '30 10 * * 1-5'
  workflow_dispatch:

jobs:
  taiwan-analysis:
    name: 執行市場分析與篩選
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
          cache: 'pip'

      - name: Environment Setup
        run: |
          python -m pip install --upgrade pip
          pip install pandas yfinance requests lxml tqdm resend numpy tabulate

      - name: Run Integrated Analysis
        env:
          RESEND_API_KEY: ${{ secrets.RESEND_API_KEY }}
          REPORT_RECEIVER_EMAIL: ${{ secrets.REPORT_RECEIVER_EMAIL }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: |
          # 執行主程式（內含下載、篩選、寄信）
          python main.py --market tw-share
      - name: Send Report
        # 這裡假設您的 main.py 已經整合了寄送功能，若需獨立步驟請在此新增
        run: echo "報告生成完畢，已發送至指定信箱。"
