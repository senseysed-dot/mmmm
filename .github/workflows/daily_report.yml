name: TW市場監控報告

on:
  schedule:
    - cron: '30 10 * * 1-5'
  workflow_dispatch:

jobs:
  taiwan-analysis:
    name: 🇹🇼 Taiwan Analysis
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
          cache: 'pip'

      - name: Environment Setup
        run: |
          sudo apt-get update
          sudo apt-get install -y fonts-noto-cjk
          python -m pip install --upgrade pip
          pip install pandas yfinance requests lxml tqdm resend matplotlib numpy xlrd pykrx

      - name: Run Market Analysis
        env:
          RESEND_API_KEY: ${{ secrets.RESEND_API_KEY }}
          REPORT_RECEIVER_EMAIL: ${{ secrets.REPORT_RECEIVER_EMAIL }}
        run: python main.py --market tw-share

      - name: Run Stock Scanner
        run: python strategies/scanner.py
