name: TW市場監控報告

on:
  schedule:
    - cron: '0 1 * * 1-5'   # 台灣時間 09:00（UTC+8 = 01:00 UTC），週一至週五開盤時啟動
  workflow_dispatch:

jobs:
  taiwan-analysis:
    name: 執行市場分析與篩選
    runs-on: ubuntu-latest
    timeout-minutes: 300   # 最多執行 5 小時（台股盤中 4.5 小時 + 緩衝）
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
          cache: 'pip'

      - name: Environment Setup
        run: |
          python -m pip install --upgrade pip
          pip install pandas yfinance requests lxml tqdm resend numpy tabulate

      - name: Run Integrated Analysis
        env:
          RESEND_API_KEY: ${{ secrets.RESEND_API_KEY }}
          REPORT_RECEIVER_EMAIL: ${{ secrets.REPORT_RECEIVER_EMAIL }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: |
          # 啟動盤中持續掃描模式（09:00 開盤後每 30 分鐘掃描一次，直至 13:30 收盤）
          python main.py --market tw-share

